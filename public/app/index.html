<!-- Polyfill Buffer for PDFMake/TPV - ESM-compatible -->
<script>
// Minimal Buffer polyfill for browser (avoids CommonJS require)
(function() {
if (typeof window.Buffer !== 'undefined') return;

// Create a minimal Buffer implementation for PDFMake
const BufferPolyfill = {
isBuffer: function(obj) {
return obj instanceof Uint8Array;
},
from: function(data, encoding) {
if (typeof data === 'string') {
const encoder = new TextEncoder();
return encoder.encode(data);
}
if (Array.isArray(data)) {
return new Uint8Array(data);
}
return new Uint8Array(data);
},
alloc: function(size) {
return new Uint8Array(size);
},
allocUnsafe: function(size) {
return new Uint8Array(size);
}
};

window.Buffer = BufferPolyfill;
console.log('Buffer polyfilled (inline ESM-compatible)');
})();
</script>

navigator.serviceWorker.getRegistrations().then(function (regs) {
regs.forEach(function (r) { try { r.unregister(); } catch (e) {} });

caches.keys().then(function (keys) {
keys.forEach(function (k) { try { caches.delete(k); } catch (e) {} });
});
}

// Also ensure we don't keep a "controller" alive
if (navigator.serviceWorker.controller) {
try { navigator.serviceWorker.controller.postMessage({ type: 'DEV_SW_DISABLE' }); } catch (e) {}
}

console.info('[SW] Preflight: unregister + clear caches (before bundle)');
} catch (e) {
// non-fatal
}
})();
</script>
