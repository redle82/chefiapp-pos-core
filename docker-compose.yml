# ==============================================================================
# CHEFIAPP POS CORE - Docker Compose
# ==============================================================================
# Complete stack with all services, database, and networking
# ==============================================================================

version: "3.8"

services:
  # ============================================================================
  # DATABASE - PostgreSQL with event store schema
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: chefiapp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test_password}
      POSTGRES_DB: ${POSTGRES_DB:-chefiapp_core_test}
      # Performance tuning
      POSTGRES_SHARED_BUFFERS: 256MB
      POSTGRES_MAX_CONNECTIONS: 100
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      # Schema initialization
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # Persistent data (comment out for ephemeral testing)
      - postgres_data:/var/lib/postgresql/data
      # Optional: Custom PostgreSQL config
      # - ./postgres.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-test_user} -d ${POSTGRES_DB:-chefiapp_core_test}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - chefiapp-network
    # Security: Drop unnecessary capabilities
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID

  # ============================================================================
  # POSTGREST - API Gateway for the core database (port 3001)
  # ============================================================================
  postgrest:
    image: postgrest/postgrest:v12.0.2
    container_name: chefiapp-core-postgrest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      PGRST_DB_URI: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@db:5432/${POSTGRES_DB:-chefiapp_core_test}
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: ${POSTGRES_USER:-test_user}
      PGRST_JWT_SECRET: ${VITE_SUPABASE_ANON_KEY:-chefiapp-core-secret-key-min-32-chars-long}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chefiapp-network

  # ============================================================================
  # WEBHOOK SERVER - Stripe webhook handler (port 3000)
  # ============================================================================
  webhook-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        VCS_REF: ${VCS_REF:-dev}
        VERSION: ${VERSION:-1.0.0}
    container_name: chefiapp-webhook-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@db:5432/${POSTGRES_DB:-chefiapp_core_test}
    ports:
      - "${WEBHOOK_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "dist/_legacy_isolation/server/webhook-server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chefiapp-network
    # Security
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # BILLING WEBHOOK SERVER - Stripe billing webhooks (port 3099)
  # ============================================================================
  billing-webhook-server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        VCS_REF: ${VCS_REF:-dev}
        VERSION: ${VERSION:-1.0.0}
    container_name: chefiapp-billing-webhook
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3099
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@db:5432/${POSTGRES_DB:-chefiapp_core_test}
    ports:
      - "${BILLING_WEBHOOK_PORT:-3099}:3099"
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "dist/_legacy_isolation/server/billing-webhook-server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3099/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chefiapp-network
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # SUBSCRIPTION MANAGEMENT UI (port 4310)
  # ============================================================================
  subscription-ui:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        VCS_REF: ${VCS_REF:-dev}
        VERSION: ${VERSION:-1.0.0}
    container_name: chefiapp-subscription-ui
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SUBSCRIPTION_UI_PORT: 4310
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:?STRIPE_PUBLISHABLE_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@db:5432/${POSTGRES_DB:-chefiapp_core_test}
    ports:
      - "${SUBSCRIPTION_UI_PORT:-4310}:4310"
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "node",
        "dist/_legacy_isolation/server/subscription-management-server.js",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4310/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chefiapp-network
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # WEB MODULE API SERVER (port 4320)
  # ============================================================================
  web-module-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-$(date -u +"%Y-%m-%dT%H:%M:%SZ")}
        VCS_REF: ${VCS_REF:-dev}
        VERSION: ${VERSION:-1.0.0}
    container_name: chefiapp-web-module-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      WEB_MODULE_PORT: 4320
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@db:5432/${POSTGRES_DB:-chefiapp_core_test}
    ports:
      - "${WEB_MODULE_PORT:-4320}:4320"
    depends_on:
      db:
        condition: service_healthy
    command: ["node", "dist/_legacy_isolation/server/web-module-api-server.js"]
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4320/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - chefiapp-network
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

  # ============================================================================
  # KEYCLOAK - Identity & Access Management (port 8080)
  # ============================================================================
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: chefiapp-keycloak
    restart: unless-stopped
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-chefiapp_core_test}
      KC_DB_USERNAME: ${POSTGRES_USER:-test_user}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-test_password}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
    command: start-dev --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./docker-core/keycloak/chefiapp-realm.json:/opt/keycloak/data/import/chefiapp-realm.json:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - chefiapp-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================================================
  # OPTIONAL: pgAdmin for database management
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chefiapp-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chefiapp.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - chefiapp-network
    profiles:
      - tools

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  chefiapp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
