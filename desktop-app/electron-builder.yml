# electron-builder configuration
# Ref: https://www.electron.build/configuration
#
# ChefIApp Desktop is a thin Electron shell that loads chefiapp.com.
# No frontend is bundled — assets are served by Vercel CDN.

appId: com.chefiapp.desktop
productName: ChefIApp Desktop
copyright: Copyright © 2025 ChefIApp
asar: true

electronVersion: "37.3.1"

directories:
  buildResources: assets
  output: out

files:
  - dist-electron/**/*
  - assets/*.png
  - assets/*.icns
  - assets/*.ico
  - package.json

# ── macOS ────────────────────────────────────────────────────────

mac:
  category: public.app-category.business
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: assets/icon.png

dmg:
  title: "${productName} ${version}"
  icon: assets/icon.png
  background: assets/dmg-background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# ── Windows ──────────────────────────────────────────────────────

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico

# ── URL Protocol Handler ────────────────────────────────────────

protocols:
  - name: ChefIApp
    schemes:
      - chefiapp-pos
      - chefiapp
