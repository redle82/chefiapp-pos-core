<!doctype html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChefIApp • Gestão de Assinatura</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f14;
      --panel: #151a21;
      --muted: #7c8899;
      --text: #e8edf5;
      --accent: #4cf0c0;
      --accent-2: #9cb7ff;
      --danger: #ff7b7b;
      --border: #1f2630;
      --shadow: 0 18px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Space Grotesk', 'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(76,240,192,0.08), transparent 35%),
                  radial-gradient(circle at 80% 0%, rgba(156,183,255,0.1), transparent 40%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 16px 48px;
    }
    .page {
      width: min(1100px, 100%);
      display: grid;
      gap: 24px;
      grid-template-columns: 2fr 1fr;
    }
    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .heading {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .badge {
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(76,240,192,0.12);
      color: var(--accent);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 12px;
    }
    .badge.danger { background: rgba(255,123,123,0.1); color: var(--danger); }
    .muted { color: var(--muted); font-size: 14px; }
    .row { display: flex; align-items: center; gap: 12px; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-top: 16px; }
    .stat {
      background: #0f141b;
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 12px;
    }
    .stat .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat .value { font-size: 18px; font-weight: 700; margin-top: 6px; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
    button {
      border: 1px solid var(--border);
      background: #0f141b;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, border 120ms ease, box-shadow 120ms ease;
    }
    button.primary { background: linear-gradient(120deg, #4cf0c0, #9cb7ff); color: #0c0f14; border: none; }
    button:hover { transform: translateY(-1px); box-shadow: 0 10px 25px rgba(0,0,0,0.25); border-color: #2c3441; }
    .list { display: grid; gap: 10px; margin-top: 12px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #101620;
      border: 1px solid var(--border);
      font-size: 13px;
      color: var(--text);
    }
    .pill .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); }
    .section-title { font-size: 15px; font-weight: 700; margin: 16px 0 8px; letter-spacing: 0.01em; }
    .feature-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 10px; }
    .feature { padding: 10px 12px; border-radius: 12px; border: 1px solid var(--border); background: #0f141b; display: flex; gap: 8px; align-items: center; }
    .feature .icon { color: var(--accent); }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
  </style>
</head>
<body>
  <div class="page">
    <div class="card" id="card-subscription">
      <div class="heading">
        <div>
          <div class="title">Sua assinatura</div>
          <div class="muted">Plano, status e add-ons do merchant</div>
        </div>
        <div class="badge" id="status-badge">--</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Plano</div>
          <div class="value" id="plan-name">--</div>
        </div>
        <div class="stat">
          <div class="label">Trial até</div>
          <div class="value" id="trial-end">--</div>
        </div>
        <div class="stat">
          <div class="label">Próximo ciclo</div>
          <div class="value" id="period-end">--</div>
        </div>
      </div>

      <div class="section-title">Add-ons</div>
      <div class="list" id="addons-list"></div>

      <div class="actions">
        <button class="primary" id="btn-upgrade">Upgrade de Plano</button>
        <button id="btn-addon">Gerir Add-ons</button>
        <button id="btn-payment">Atualizar Pagamento</button>
      </div>

      <div class="divider"></div>

      <div class="section-title">Features disponíveis</div>
      <div class="feature-list" id="feature-list"></div>
    </div>

    <div class="card">
      <div class="title">Resumo rápido</div>
      <div class="list" style="margin-top: 12px;">
        <div class="pill"><span class="dot"></span><span id="merchant-name">--</span></div>
        <div class="pill"><span class="dot"></span><span id="merchant-email">--</span></div>
        <div class="pill"><span class="dot"></span><span id="raw-status">--</span></div>
      </div>

      <div class="section-title">Mensagens de bloqueio</div>
      <div class="list" id="block-messages"></div>
    </div>
  </div>

  <script>
    const statusBadge = document.getElementById('status-badge');
    const planName = document.getElementById('plan-name');
    const trialEnd = document.getElementById('trial-end');
    const periodEnd = document.getElementById('period-end');
    const addonsList = document.getElementById('addons-list');
    const featureList = document.getElementById('feature-list');
    const merchantName = document.getElementById('merchant-name');
    const merchantEmail = document.getElementById('merchant-email');
    const rawStatus = document.getElementById('raw-status');
    const blockMessages = document.getElementById('block-messages');
    const btnUpgrade = document.getElementById('btn-upgrade');
    const btnAddon = document.getElementById('btn-addon');
    const btnPayment = document.getElementById('btn-payment');

    function formatDate(value) {
      if (!value) return '—';
      try {
        const d = new Date(value);
        return d.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' });
      } catch { return '—'; }
    }

    function renderAddons(addons) {
      addonsList.innerHTML = '';
      if (!addons || addons.length === 0) {
        addonsList.innerHTML = '<div class="muted">Nenhum add-on ativo</div>';
        return;
      }
      addons.forEach(a => {
        const el = document.createElement('div');
        el.className = 'pill';
        el.innerHTML = `<span class="dot"></span><span>${a}</span>`;
        addonsList.appendChild(el);
      });
    }

    function renderFeatures(features) {
      featureList.innerHTML = '';
      features.forEach(f => {
        const el = document.createElement('div');
        el.className = 'feature';
        el.innerHTML = `<span class="icon">✓</span><span>${f}</span>`;
        featureList.appendChild(el);
      });
    }

    function renderBlockMessages(context) {
      blockMessages.innerHTML = '';
      const blocked = [];
      const targets = ['MULTI_LOCATION', 'WHITE_LABEL', 'ANALYTICS_PRO'];
      targets.forEach(t => {
        blocked.push({ feature: t, message: `Requer upgrade/add-on (${t})` });
      });
      blocked.forEach(b => {
        const el = document.createElement('div');
        el.className = 'pill';
        el.innerHTML = `<span class="dot" style="background:${'var(--danger)'}"></span><span>${b.message}</span>`;
        blockMessages.appendChild(el);
      });
    }

    async function loadData() {
      const res = await fetch('/api/subscription');
      if (!res.ok) throw new Error('Falha ao carregar');
      const data = await res.json();

      merchantName.textContent = data.merchant;
      merchantEmail.textContent = data.subscription?.subscription_id || '—';
      rawStatus.textContent = `Stripe: ${data.subscription?.raw_status}`;

      statusBadge.textContent = data.subscription?.status || '--';
      statusBadge.classList.toggle('danger', ['SUSPENDED','CANCELLED'].includes(data.subscription?.status));

      planName.textContent = data.subscription?.tier || '--';
      trialEnd.textContent = formatDate(data.subscription?.trial_end);
      periodEnd.textContent = formatDate(data.subscription?.current_period_end);

      renderAddons(data.subscription?.addons || []);
      renderFeatures(data.features || []);
      renderBlockMessages(data.subscription);
    }

    async function postJSON(url, body) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {}),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'Erro');
      }
      return res.json();
    }

    btnUpgrade.addEventListener('click', async () => {
      const tier = prompt('Novo plano (STARTER / PROFESSIONAL / ENTERPRISE):', 'PROFESSIONAL');
      if (!tier) return;
      try {
        const data = await postJSON('/api/subscription/upgrade', { tier });
        renderFeatures(data.features || []);
        statusBadge.textContent = data.subscription?.status;
        planName.textContent = data.subscription?.tier;
        trialEnd.textContent = formatDate(data.subscription?.trial_end);
        periodEnd.textContent = formatDate(data.subscription?.current_period_end);
        renderAddons(data.subscription?.addons || []);
        alert('Plano atualizado com sucesso');
      } catch (err) {
        alert('Falha ao atualizar plano: ' + err.message);
      }
    });

    btnAddon.addEventListener('click', async () => {
      const addon = prompt('Adicionar add-on (RESERVATIONS / WEB_PAGE / MULTI_LOCATION / WHITE_LABEL / ANALYTICS_PRO / EXTRA_TERMINAL):', 'WEB_PAGE');
      if (!addon) return;
      try {
        const data = await postJSON('/api/subscription/addon', { addon });
        renderFeatures(data.features || []);
        renderAddons(data.subscription?.addons || []);
        alert('Add-on aplicado');
      } catch (err) {
        alert('Falha ao aplicar add-on: ' + err.message);
      }
    });

    btnPayment.addEventListener('click', async () => {
      try {
        const data = await postJSON('/api/subscription/payment');
        if (data.url) window.open(data.url, '_blank');
      } catch (err) {
        alert('Falha ao abrir portal: ' + err.message);
      }
    });

    loadData().catch(err => {
      console.error(err);
      statusBadge.textContent = 'Erro';
      statusBadge.classList.add('danger');
    });
  </script>
</body>
</html>
