genesis:
  description: "System Birth & Onboarding"
  required_flows:
    - "onboarding_wizard"
    - "tenant_creation"
    - "user_creation"
    - "menu_bootstrap"
  constraints:
    - "must_use_real_db"
    - "must_not_use_seeds"

runtime_guards:
  description: "Production Safety Contracts"
  rules:
    - id: "assert_no_mock"
      file: "src/core/runtime/RuntimeContext.ts"
      pattern: "assertNoMock"
    - id: "db_write_gate"
      file: "src/core/governance/DbWriteGate.ts"
      pattern: "DbWriteGate"

deployment:
  environment: "production"
  provider: "vercel"
  checks:
    - "env_vars_presence"
    - "build_success"

truth_scan:
  ignore_paths:
    - "src/pages/Onboarding/PlacesMock.ts" # Explicit exception for external API mock
