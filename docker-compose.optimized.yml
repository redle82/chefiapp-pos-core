# ==============================================================================
# CHEFIAPP POS CORE - Docker Compose (Optimized)
# ==============================================================================
# Complete production-ready stack with:
# - Health checks for all services
# - Resource limits
# - Security hardening
# - Logging configuration
# - Development and production profiles
# ==============================================================================

version: "3.8"

# ==============================================================================
# SERVICE DEFINITIONS
# ==============================================================================
services:
  # ============================================================================
  # DATABASE - PostgreSQL with event store schema
  # ============================================================================
  db:
    image: postgres:15-alpine
    container_name: chefiapp-db
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-test_password}
      POSTGRES_DB: ${POSTGRES_DB:-chefiapp_core_test}
      POSTGRES_SHARED_BUFFERS: ${POSTGRES_SHARED_BUFFERS:-256MB}
      POSTGRES_MAX_CONNECTIONS: ${POSTGRES_MAX_CONNECTIONS:-100}
      POSTGRES_WORK_MEM: ${POSTGRES_WORK_MEM:-4MB}

    ports:
      - "${DB_PORT:-5432}:5432"

    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-test_user} -d ${POSTGRES_DB:-chefiapp_core_test}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - chefiapp-network

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M

    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # BACKEND API (port 4320) — integration-gateway
  # ============================================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-dev}
        VERSION: ${VERSION:-1.0.0}
      cache_from:
        - ${DOCKER_REGISTRY:-}chefiapp-pos-core:latest
    image: ${DOCKER_REGISTRY:-}chefiapp-pos-core:${VERSION:-latest}
    container_name: chefiapp-backend
    restart: unless-stopped

    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 4320
      LOG_LEVEL: ${LOG_LEVEL:-info}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-test_user}:${POSTGRES_PASSWORD:-test_password}@db:5432/${POSTGRES_DB:-chefiapp_core_test}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-chefiapp-internal-token-dev}
      CORE_URL: ${CORE_URL:-http://host.docker.internal:3001}
      CORE_ANON_KEY: ${CORE_ANON_KEY:-chefiapp-core-secret-key-min-32-chars-long}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://host.docker.internal:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-chefiapp-products}
      MINIO_PUBLIC_BASE: ${MINIO_PUBLIC_BASE:-http://localhost:9000}

    ports:
      - "${BACKEND_PORT:-4320}:4320"

    depends_on:
      db:
        condition: service_healthy

    command: ["node", "dist/server/integration-gateway.js"]

    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4320/health",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - chefiapp-network

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 128M

    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # OPTIONAL: pgAdmin for database management
  # ============================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: chefiapp-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@chefiapp.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"

    ports:
      - "${PGADMIN_PORT:-5050}:80"

    depends_on:
      - db

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    networks:
      - chefiapp-network

    profiles:
      - tools

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

# ==============================================================================
# NETWORKS
# ==============================================================================
networks:
  chefiapp-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    driver_opts:
      com.docker.network.bridge.name: chefiapp0

# ==============================================================================
# VOLUMES
# ==============================================================================
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR:-./data}/postgres

  postgres_logs:
    driver: local

  pgadmin_data:
    driver: local
