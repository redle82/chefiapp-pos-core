name: Bug report
description: Report incorrect behaviour or a regression
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Language:** Prefer **English** for technical detail (see `docs/LANGUAGE_POLICY.md`).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, in one short paragraph.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment (optional)
      description: e.g. browser, OS, branch, Core local/docker.
    validations:
      required: false
