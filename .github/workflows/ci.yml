name: ChefIApp CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  # Allow nightly flakiness runs via workflow_dispatch
  workflow_dispatch:
    inputs:
      flakiness_repeat:
        description: "Repeat-each count for flakiness analysis (default 10)"
        default: "10"
        type: string
      debug_open_handles:
        description: "Run Jest open-handles diagnostics in validate job"
        default: false
        type: boolean

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    env:
      BILLING_AUDIT_DATABASE_URL: ${{ secrets.CORE_BILLING_AUDIT_DATABASE_URL }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Fail-fast (typecheck + build)
        run: make simulate-failfast

      - name: Check Formatting
        continue-on-error: true
        run: npx prettier --check .

      - name: Lint
        run: npm run -w merchant-portal lint

      - name: Run tests
        continue-on-error: true
        run: npm run test:ci

      - name: Diagnose Jest open handles
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.debug_open_handles == 'true'
        run: npm run test:ci:open-handles

      - name: Merchant-portal canonical coverage gate (Vitest)
        continue-on-error: true
        run: |
          pnpm --filter merchant-portal exec vitest run --coverage
          pnpm --filter merchant-portal run check:coverage:branches

      - name: Server coverage gate
        continue-on-error: true
        run: npm run test:server-coverage && npm run check:server-coverage

      - name: Sovereignty gate (order creation via Core)
        run: bash ./scripts/sovereignty-gate.sh

      - name: Check financial domain uses Core only (no supabase.from gm_orders|fiscal|inventory)
        run: bash ./scripts/check-financial-supabase.sh

      # C4.3: Billing Core audit — runs only when CORE_BILLING_AUDIT_DATABASE_URL is set (release readiness).
      # Fails job on DRIFT/BAD_VALUE or connection error (exit 1). Skip when secret not configured.
      - name: Audit billing Core (gm_restaurants.billing_status vs merchant_subscriptions)
        if: env.BILLING_AUDIT_DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ env.BILLING_AUDIT_DATABASE_URL }}
        run: npm run audit:billing-core

      # F5.2: Fase 3 conformance — desktop/portal/mobile identity & pairing; fails job on exit 1.
      - name: Audit Fase 3 conformance (identity, pairing, role-from-backend)
        run: npm run audit:fase3-conformance

      # Note: Automation dispatch contract (storage:core + dedup) is validated by
      # .github/workflows/automation-dispatch-contract.yml (path-triggered on
      # server/integration-gateway.ts and gm_automation_events migration changes)

  e2e-smoke:
    name: E2E Suite (Playwright — 4 layers)
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for --only-changed git diff

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: cd merchant-portal && npx playwright install --with-deps chromium

      # ── Boot Integrity Gate (conflict markers + tsc + vite build) ──
      - name: Boot integrity gate
        run: SKIP_HEALTH=1 bash scripts/e2e/boot-integrity-gate.sh

      - name: Start preview server
        run: |
          npm -w merchant-portal run build
          npm -w merchant-portal run preview &
          for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" http://localhost:4173/ | grep -q 200 && break; sleep 2; done

      # ── Layer 0-3: setup → smoke → contracts → core ──
      - name: Run E2E (all layers, fail-on-flaky)
        run: |
          cd merchant-portal
          npx playwright test \
            --fail-on-flaky-tests \
            --reporter=list \
            --reporter=json:artifacts/playwright-results.json \
            --reporter=html
        env:
          CI: "true"
          E2E_NO_WEB_SERVER: "1"
          E2E_BASE_URL: "http://localhost:4173"

      # ── Artifacts: always upload reports + traces ──
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: merchant-portal/playwright-report/
          retention-days: 14

      - name: Upload Playwright JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-report
          path: merchant-portal/artifacts/playwright-results.json
          retention-days: 14

      - name: Upload Traces & Screenshots (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: merchant-portal/test-results/
          retention-days: 14

  # ── Nightly / on-demand flakiness analysis ──
  flakiness-audit:
    name: Flakiness Audit (repeat-each × N)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: cd merchant-portal && npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm -w merchant-portal run build
          npm -w merchant-portal run preview &
          for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" http://localhost:4173/ | grep -q 200 && break; sleep 2; done

      - name: Flakiness hunt (repeat-each=${{ github.event.inputs.flakiness_repeat || '10' }})
        run: |
          cd merchant-portal
          npx playwright test \
            --project=setup --project=contracts --project=core \
            --repeat-each=${{ github.event.inputs.flakiness_repeat || '10' }} \
            --retries=0 --workers=1 \
            --fail-on-flaky-tests \
            --reporter=list \
            --reporter=json:artifacts/flakiness-results.json
        env:
          CI: "true"
          E2E_NO_WEB_SERVER: "1"
          E2E_BASE_URL: "http://localhost:4173"

      - name: Parse flakiness report
        if: always()
        run: python3 scripts/e2e/parse-flakiness.py < merchant-portal/artifacts/flakiness-results.json

      - name: Upload flakiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-report
          path: merchant-portal/artifacts/flakiness-results.json
          retention-days: 30
