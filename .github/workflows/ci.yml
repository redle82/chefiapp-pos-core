name: ChefIApp CI

# ────────────────────────────────────────────────────
# SINGLE REQUIRED PIPELINE  (stabilisation phase)
# PR  → validate job only  (fast feedback)
# main → validate + e2e-smoke
# ────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      flakiness_repeat:
        description: "Repeat-each count for flakiness analysis (default 10)"
        default: "10"
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install ripgrep (rg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: BrowserBlockGuard purity gate
        run: npm run check:browser-guard-purity

      - name: AppStaff official guardrail
        run: npm run check:appstaff-official

      - name: Merchant Portal type-check
        run: pnpm --filter merchant-portal run type-check

      - name: Fail-fast (typecheck + build)
        run: make simulate-failfast

      - name: Lint
        run: npm run -w merchant-portal lint

      - name: Run tests
        run: npm test -- --ci --testTimeout=15000 --maxWorkers=2

      - name: Sovereignty gate
        run: bash ./scripts/sovereignty-gate.sh

      - name: Financial domain gate
        run: bash ./scripts/check-financial-supabase.sh

      - name: Contract gate (docs integrity)
        run: bash ./scripts/contract-gate.sh

      - name: Restaurant Canon gate
        run: npm run check:restaurant-canon

      - name: Operational Device-Only gate
        run: npm run check:operational-device-only

      - name: Admin General Contract gate
        run: npm run check:admin-general-contract

      - name: SW-not-in-dev gate
        run: npm run check:sw-not-in-dev

      - name: VSCode dev-task bypass gate
        run: npm run check:vscode-dev-tasks

      - name: Script-level dev bypass gate
        run: npm run check:dev-bypass-scripts

      - name: Contradictions gate (High severity)
        run: npm run -s audit:ledger:high

      - name: Detect bypass gate scope
        id: bypass_scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          printf "%s\n" "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^(merchant-portal/src/core/(boot|flow|runtime|tenant|identity|billing|lifecycle)/|merchant-portal/src/(pages|features|routes)/|merchant-portal/eslint\.config\.js|docs/(architecture|audit)/|scripts/audit/)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bypass gate (fail on new findings)
        if: steps.bypass_scope.outputs.should_run == 'true'
        run: npm run -s audit:bypass:fail-on-new

      - name: Detect MRP-001 cutover scope
        id: mrp001_scope
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" || true)"
          printf "%s\n" "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -Eq '^(server/integration-gateway\.ts|integration-gateway/src/|scripts/flows/mrp001-cutover-smoke\.sh|docs/audit/MONOREPO_MRP001_)'; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: MRP-001 cutover smoke gate
        if: steps.mrp001_scope.outputs.should_run == 'true'
        run: npm run smoke:mrp001-cutover

  e2e-smoke:
    name: E2E Suite (Playwright — 4 layers)
    runs-on: ubuntu-latest
    needs: validate
    # Non-blocking: 3 contract tests need Supabase/Core backend (pre-existing).
    # Required Check is "Validate Code Quality" only.
    continue-on-error: true

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed for --only-changed git diff

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: cd merchant-portal && npx playwright install --with-deps chromium

      # ── Boot Integrity Gate (conflict markers + tsc + vite build) ──
      - name: Boot integrity gate
        run: SKIP_HEALTH=1 bash scripts/e2e/boot-integrity-gate.sh

      - name: Start preview server
        run: |
          npm -w merchant-portal run build
          npm -w merchant-portal run preview &
          for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" http://localhost:4173/ | grep -q 200 && break; sleep 2; done

      # ── Layer 0-3: setup → smoke → contracts → core ──
      - name: Run E2E (all layers, fail-on-flaky)
        run: |
          cd merchant-portal
          npx playwright test \
            --fail-on-flaky-tests \
            --reporter=list \
            --reporter=json:artifacts/playwright-results.json \
            --reporter=html
        env:
          CI: "true"
          E2E_NO_WEB_SERVER: "1"
          E2E_BASE_URL: "http://localhost:4173"

      # ── Artifacts: always upload reports + traces ──
      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: merchant-portal/playwright-report/
          retention-days: 14

      - name: Upload Playwright JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-json-report
          path: merchant-portal/artifacts/playwright-results.json
          retention-days: 14

      - name: Upload Traces & Screenshots (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: merchant-portal/test-results/
          retention-days: 14

  # ── Nightly / on-demand flakiness analysis ──
  flakiness-audit:
    name: Flakiness Audit (repeat-each × N)
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: cd merchant-portal && npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm -w merchant-portal run build
          npm -w merchant-portal run preview &
          for i in $(seq 1 30); do curl -s -o /dev/null -w "%{http_code}" http://localhost:4173/ | grep -q 200 && break; sleep 2; done

      - name: Flakiness hunt (repeat-each=${{ inputs.flakiness_repeat || '10' }})
        run: |
          cd merchant-portal
          npx playwright test \
            --project=setup --project=contracts --project=core \
            --repeat-each=${{ inputs.flakiness_repeat || '10' }} \
            --retries=0 --workers=1 \
            --fail-on-flaky-tests \
            --reporter=list \
            --reporter=json:artifacts/flakiness-results.json
        env:
          CI: "true"
          E2E_NO_WEB_SERVER: "1"
          E2E_BASE_URL: "http://localhost:4173"

      - name: Parse flakiness report
        if: always()
        run: python3 scripts/e2e/parse-flakiness.py < merchant-portal/artifacts/flakiness-results.json

      - name: Upload flakiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flakiness-report
          path: merchant-portal/artifacts/flakiness-results.json
          retention-days: 30
