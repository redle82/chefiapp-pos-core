name: UI Guardrails (Anti-Duplication)

# ⚠️ STABILISATION: demoted to nightly + manual (was: push+PR path-filtered)
# Reintroduce as blocking in Phase 2 — see CI_GOVERNANCE.md

on:
  schedule:
    - cron: "0 4 * * 6" # Weekly Saturday 04:00 UTC
  workflow_dispatch:

jobs:
  guardrails:
    name: 🧱 Enforce UI Canon
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run UI guardrails
        run: node scripts/check-ui-guardrails.mjs
