name: Check All Screens

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  check-screens:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: merchant-portal
        run: npx playwright install --with-deps chromium

      - name: Run screen check
        continue-on-error: true
        working-directory: .
        run: node scripts/open_screens.mjs
        env:
          CI: true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: artifacts/screenshots/
          retention-days: 7

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screen-report
          path: artifacts/screens_report.md
          retention-days: 7

      - name: Check for errors
        continue-on-error: true
        run: |
          if grep -q "❌ Erros:" artifacts/screens_report.md; then
            echo "❌ Some screens failed to load"
            cat artifacts/screens_report.md
            exit 1
          else
            echo "✅ All screens loaded successfully"
          fi
