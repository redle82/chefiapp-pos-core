# Contract Gate — Integridade de contratos: sem .md vazios, sem links quebrados, sem docs não indexados.
# Runs on pull_request and push to main. Fails if any check fails.

name: Contract Gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  contract-gate:
    name: Contract integrity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run audit-contracts-referenced
        run: bash ./scripts/audit-contracts-referenced.sh

      - name: Run contract-gate
        run: bash ./scripts/contract-gate.sh
