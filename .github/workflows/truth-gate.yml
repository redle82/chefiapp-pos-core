name: Truth Gate

# ⚠️ STABILISATION: demoted to nightly + manual (was: push+PR)
# Playwright-heavy. Reintroduce as blocking in Phase 3 — see CI_GOVERNANCE.md

on:
  schedule:
    - cron: "0 4 * * 6" # Weekly Saturday 04:00 UTC
  workflow_dispatch:

jobs:
  truth-lock:
    name: 🧊 Truth Freeze (Codex Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🛡️ Verify Truth (test:truth)
        run: npm run test:truth
        env:
          CI: true

      - name: 🛡️ Upload Traces on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: truth-traces
          path: test-results/
          retention-days: 3
