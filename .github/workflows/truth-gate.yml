name: Truth Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  truth-lock:
    name: 🧊 Truth Freeze (Codex Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: 🛡️ Verify Truth (test:truth)
        continue-on-error: true
        run: npx playwright test tests/playwright/truth/truth.tpv.spec.ts --config=playwright.config.truth.ts --max-failures=1 --retries=2 --timeout=60000
        env:
          CI: true

      - name: 🛡️ Upload Traces on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: truth-traces
          path: test-results/
          retention-days: 3
