name: Truth Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  truth-lock:
    name: 🧊 Truth Freeze (Codex Gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: 🛡️ Verify Truth (test:truth)
      run: npm run test:truth
      env:
        CI: true

    - name: 🛡️ Upload Traces on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: truth-traces
        path: test-results/
        retention-days: 3
