events {
    worker_connections 1024;
}

http {
    upstream postgrest {
        server postgrest:3000;
    }

    upstream realtime {
        server realtime:4000;
    }

    # Map para upgrade WebSocket
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 3001;

        # Proxy /realtime/v1/websocket para realtime:4000/socket/websocket (WebSocket)
        location /realtime/ {
            rewrite ^/realtime/v1/websocket$ /socket/websocket?$args break;
            proxy_pass http://realtime;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Preservar query string (apikey, vsn, etc.)
            proxy_set_header X-Forwarded-Query $args;
            # Timeout para WebSocket
            proxy_read_timeout 86400;
        }

        # Proxy /rest/v1/* para postgrest:3000/*
        # Importante: zerar Authorization para evitar validação de JWT pelo PostgREST.
        # Assim, qualquer chamada via supabase-js cai como usuário anônimo (DB_ANON_ROLE).
        location /rest/v1/ {
            rewrite ^/rest/v1/(.*) /$1 break;
            proxy_pass http://postgrest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }

        # Proxy direto para postgrest (sem /rest/v1/)
        # Também limpamos Authorization aqui por consistência.
        location / {
            proxy_pass http://postgrest;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Authorization "";
        }
    }
}
